<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <meta
      name="description"
      content="Improve your front-end skills by building projects. Scan the QR code to visit Frontend Mentor and level up your coding skills!"
    />
    <meta
      name="keywords"
      content="QR code, Frontend Mentor, coding skills, front-end projects"
    />
    <meta name="author" content="Ruben de Man" />

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />

    <title>Frontend Mentor | QR code component</title>

    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main>
      <section class="qr-component">
        <img
          class="qr-component__image"
          src="./assets/images/image-qr-code.png"
          width="288"
          height="288"
          alt="QR code linking to the Frontend Mentor website"
        />
        <div class="qr-component__content">
          <h2 class="qr-component__title">
            Improve your front-end skills by building projects
          </h2>
          <p class="qr-component__text">
            Scan the QR code to visit Frontend Mentor and take your coding
            skills to the next level
          </p>
        </div>
      </section>
    </main>

    <footer class="attribution">
      <p>
        Challenge by
        <a
          class="attribution__link"
          href="https://www.frontendmentor.io?ref=challenge"
          target="_blank"
          >Frontend Mentor</a
        >. Coded by
        <a
          class="attribution__link"
          href="https://rubendeman.nl"
          target="_blank"
          >Ruben de Man</a
        >.
      </p>
    </footer>
  </body>
</html>
